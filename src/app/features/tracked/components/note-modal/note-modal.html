<div class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
  <div class="bg-white border-4 border-black max-w-2xl w-full shadow-[8px_8px_0_black]">
    <div class="border-b-4 border-black p-6 bg-yellow-100">
      <h2 class="text-2xl font-bold text-black uppercase tracking-wider flex items-center gap-2">
        <span class="material-icons">track_changes</span>
        Track Job Application
      </h2>
      <p class="text-sm text-gray-700 mt-2">
        <span class="font-semibold">{{ jobTitle() }}</span> at {{ company() }}
      </p>
    </div>

    <form [formGroup]="noteForm" class="p-6">
      <div class="mb-4 p-4 bg-blue-50 border-2 border-blue-600">
        <p class="text-sm text-blue-900 flex items-center gap-2">
          <span class="material-icons text-base">info</span>
          <span>Add a note to track this application (required)</span>
        </p>
      </div>

      <div class="mb-4">
        <label class="block text-black font-semibold mb-2">
          Note <span class="text-red-600">*</span>
        </label>
        <textarea 
          formControlName="note"
          rows="6"
          placeholder="Why are you interested in this position? What makes you a good fit?"
          class="w-full border-2 border-black p-3 focus:outline-none focus:border-yellow-600 transition-colors resize-none"
          >
        </textarea>
        @if(getError('note')){
            <p class="text-red-600 font-semibold text-sm mt-1">{{getError('note')}}</p>
        }
      </div>

      <div class="flex gap-3">
        <button 
          type="button"
          (click)="cancel()" 
          class="flex-1 bg-white text-black hover:bg-gray-200 border-2 border-black font-semibold py-3 px-6 uppercase tracking-wider transition-colors">
          Cancel
        </button>
        <button 
          type="button"
          (click)="track()" 
          [disabled]="noteForm.invalid"
          class="flex-1 bg-black text-white border-2 border-black font-semibold py-3 px-6 uppercase tracking-wider transition-colors flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-800 disabled:hover:bg-black">
          <span class="material-icons text-base">track_changes</span>
          Track Application
        </button>
      </div>
    </form>
  </div>
</div>
