<div class="container mx-auto px-4 py-8">

  <app-title-text [title]="'Tracked Applications'" [titleDescription]="'Track and manage your job applications'"></app-title-text>



  @if ((tracked$ | async)?.length === 0) {
    <div class="text-center py-12 bg-white border-2 border-black p-8">
      <span class="material-icons text-6xl text-gray-400">track_changes</span>
      <p class="mt-4 text-gray-600 text-xl">No tracked applications yet</p>
      <p class="text-gray-500 mt-2">Start tracking jobs to manage your applications!</p>
      <a routerLink="/offers" class="inline-block mt-6 bg-black text-white hover:bg-white hover:text-black border-2 border-black font-bold py-3 px-6 uppercase tracking-wider transition-colors">
        Browse Jobs
      </a>
    </div>
  }

  @if ((tracked$ | async) && (tracked$ | async)!.length > 0) {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (tracked of (tracked$| async); track tracked.id) {
        <app-tracked-item [tracked]="tracked"></app-tracked-item>
      }
    </div>
  }
</div>
