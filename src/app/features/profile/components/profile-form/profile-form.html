<form [formGroup]="profileForm" (ngSubmit)="onProfileSubmit()">
  <div class="space-y-4">
    <div>
      <label for="firstName" class="block text-sm font-bold mb-2 text-black uppercase"
        >First Name</label
      >
      <input
        id="firstName"
        type="text"
        formControlName="firstName"
        class="w-full border-2 border-black px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black"
        placeholder="Enter your first name"
      />
      @if(getError("firstName")){
        <div class="text-red-600 text-sm mt-1">{{ getError("firstName") }}</div>
      }
    </div>

    <div>
      <label for="lastName" class="block text-sm font-bold mb-2 text-black uppercase"
        >Last Name</label
      >
      <input
        id="lastName"
        type="text"
        formControlName="lastName"
        class="w-full border-2 border-black px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black"
        placeholder="Enter your last name"
      />
      @if(getError("lastName")){
        <div class="text-red-600 text-sm mt-1">{{ getError("lastName") }}</div>
      }
    </div>

    <div>
      <label for="email" class="block text-sm font-bold mb-2 text-black uppercase">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        class="w-full border-2 border-black px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black"
        placeholder="Enter your email"
      />
      @if(getError("email")){
        <div class="text-red-600 text-sm mt-1">{{ getError("email") }}</div>
      }
    </div>

    <div class="flex gap-4 pt-4">
      <button
        type="submit"
        [disabled]="profileForm.invalid || (loading$ | async)"
        class="flex-1 bg-black text-white hover:bg-white hover:text-black border-2 border-black font-bold py-3 px-6 uppercase tracking-wider transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
      >
        <span class="material-icons">save</span>
        Save Changes
      </button>

      <button
        type="button"
        (click)="toggleEditMode.emit()"
        class="flex-1 bg-white text-black hover:bg-black hover:text-white border-2 border-black font-bold py-3 px-6 uppercase tracking-wider transition-colors"
      >
        Cancel
      </button>
    </div>
  </div>
</form>
