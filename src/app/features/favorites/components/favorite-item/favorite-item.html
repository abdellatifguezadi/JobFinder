<div class="w-full border-2 border-black bg-white p-5 transition-all hover:shadow-[8px_8px_0_black] hover:-translate-x-1 hover:-translate-y-1">
  <div class="border-b-2 border-black pb-3 mb-4">
    <h3 class="text-lg font-bold text-black mb-2">{{ favorite().title }}</h3>
    <span class="text-sm text-black">{{ favorite().company || 'Not specified' }}</span>
  </div>
  
  <div class="flex gap-4 mb-3 text-xs text-black">
    <span class="flex items-center gap-1">
      <span class="material-icons text-base">location_on</span>
      {{ favorite().location || 'Not specified' }}
    </span>
  </div>

  <button 
    (click)="removeFavorite()"
    class="w-full bg-red-600 text-white hover:bg-white hover:text-red-600 border-2 border-red-600 font-semibold py-2 px-4 transition-colors flex items-center justify-center gap-2">
    <span class="material-icons text-base">delete</span>
    Remove from Favorites
  </button>
</div>
