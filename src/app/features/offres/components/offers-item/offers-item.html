<div class="w-full border-2 border-black bg-white p-5 transition-all hover:shadow-[8px_8px_0_black] hover:-translate-x-1 hover:-translate-y-1 cursor-pointer">
   <input type="hidden" [value]="job().id" />
  
  <div class="border-b-2 border-black pb-3 mb-4">
    <h3 class="text-lg font-bold text-black mb-2">{{ job().title }}</h3>
    <span class="text-sm text-black">{{ job().company || 'Not specified' }}</span>
  </div>
  
  <div class="flex gap-4 mb-3 text-xs text-black">
    <span class="flex items-center gap-1">
      <span class="material-icons text-base">location_on</span>
      {{ job().location || 'Not specified' }}
    </span>
    <span class="flex items-center gap-1">
      <span class="material-icons text-base">calendar_today</span>
      {{ job().created | date: 'dd/MM/yyyy HH:mm' }}
    </span>
  </div>
  
  <p class="text-sm text-black leading-relaxed my-3 line-clamp-3" [innerHTML]="job().description"></p>
  
  <div class="bg-black text-white px-3 py-2 inline-flex items-center gap-2 font-semibold text-sm my-3">
    <span class="material-icons text-base">payments</span>
    {{ job().salary }}
  </div>
  
  <div class="flex gap-3 mb-3">
    <button class="flex-1 bg-white text-black hover:bg-black hover:text-white border-2 border-black font-semibold py-2 px-4 transition-colors flex items-center justify-center gap-2">
      <span class="material-icons text-base">favorite_border</span>
      Favorite
    </button>
    <button class="flex-1 bg-white text-black hover:bg-black hover:text-white border-2 border-black font-semibold py-2 px-4 transition-colors flex items-center justify-center gap-2">
      <span class="material-icons text-base">track_changes</span>
      Track
    </button>
  </div>
  
  <a [href]="job().redirectUrl" target="_blank" class="block w-full text-center bg-black text-white hover:bg-white hover:text-black border-2 border-black uppercase tracking-wider font-semibold py-3 px-6 transition-colors">
    View full offer
  </a>
</div>
